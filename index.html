<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Profile - Trần Gia Đại</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            line-height: 1.6;
        }

        /* --- Ảnh nền --- */
        .background-banner {
            height: 250px;
            background: url('ảnh.jpg') center/cover no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 0;
        }

        /* --- Bố cục chung Điện thoại --- */
        .container {
            max-width: 420px;
            margin: 120px auto 40px;
            padding: 0 15px;
            position: relative;
            z-index: 1;
        }

        .card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        /* --- Avatar & Badges --- */
        .avatar-container {
            position: relative;
            margin-top: -80px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .avatar-border {
            background: #23cad9;
            padding: 6px;
            border-radius: 40px;
            display: inline-block;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 4px solid white;
            display: block;
        }

        .badge-fps {
            position: absolute;
            top: 20px;
            left: -30px;
            background: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .badge-fps::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #00e676;
            border-radius: 50%;
            display: inline-block;
        }

        .badge-disc {
            position: absolute;
            top: 15px;
            right: -20px;
            background: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- Thông tin cá nhân --- */
        h1.name {
            font-size: 24px;
            font-weight: 800;
            color: #2c3e50;
            margin-top: 10px;
        }
        
        .verified { color: #1da1f2; font-size: 18px; vertical-align: middle; }
        p.alias { font-size: 14px; color: #7f8c8d; font-weight: 700; margin-bottom: 20px; }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
        }
        
        .social-links a { color: #2c3e50; font-size: 22px; text-decoration: none; transition: 0.2s; }
        .social-links a:hover { transform: scale(1.1); color: #aab6fe; }

        .info-list {
            text-align: left;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }
        
        .info-item { margin-bottom: 15px; }
        .info-label { font-size: 11px; font-weight: 800; color: #95a5a6; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .info-value { font-size: 15px; font-weight: 700; color: #34495e; }

        /* --- Giới thiệu --- */
        .about-card h2 { text-align: left; font-size: 22px; font-weight: 800; margin-bottom: 15px; position: relative; }
        .about-card h2::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 40px; height: 3px;
            background: linear-gradient(90deg, #f39c12, #3498db); border-radius: 2px;
        }
        .about-card p { text-align: left; font-weight: 700; font-size: 14px; color: #555; margin-bottom: 25px; }

        /* --- Thanh toán (Ngân hàng) --- */
        .payment-box {
            border: 1px solid #eee; 
            border-radius: 16px; 
            padding: 20px 15px; 
            text-align: center; 
            margin-bottom: 15px;
            background-color: #fafbfc;
        }
        
        .bank-img { 
            height: 55px; /* Giới hạn chiều cao để 2 logo bằng nhau */
            width: auto; 
            max-width: 100%;
            object-fit: contain; 
            margin: 0 auto 15px auto; 
            display: block; 
            border-radius: 8px; /* Bo góc nhẹ cho ảnh JPG */
        }

        .stk-highlight {
            padding: 8px 16px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: inline-block;
            font-size: 16px;
        }
        .stk-mb { background-color: #e0f7fa; color: #123281; }
        .stk-tcb { background-color: #ffebee; color: #E51124; }

        /* ========================================================
           BẬT GIAO DIỆN MÁY TÍNH (Ngang 2 cột)
           ======================================================== */
        @media (min-width: 768px) {
            .container {
                max-width: 950px; 
                margin-top: 160px;
            }
            
            .profile-card {
                display: flex;
                align-items: center;
                text-align: left;
                padding: 30px 40px;
            }
            
            .avatar-container {
                margin-top: -70px; 
                margin-right: 30px;
                margin-bottom: 0;
                flex-shrink: 0;
            }
            
            .profile-info-center {
                flex: 1; 
            }
            
            .profile-info-center h1.name { margin-top: 0; }
            .profile-info-center .social-links { justify-content: flex-start; margin-bottom: 0; }
            
            .info-list {
                border-top: none; 
                border-left: 1px solid #e2e8f0; 
                padding-top: 0;
                padding-left: 40
