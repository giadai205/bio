<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Gia Đại</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden; 
        }

        .background-banner {
            height: 250px;
            background: url('ảnh.jpg') center/cover no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 0;
        }

        .container {
            max-width: 420px;
            margin: 120px auto 40px;
            padding: 0 15px;
            position: relative;
            z-index: 1;
        }

        .card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            margin-top: -80px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .avatar-border {
            background: #23cad9;
            padding: 6px;
            border-radius: 40px;
            display: inline-block;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 4px solid white;
            display: block;
        }

        .badge-fps {
            position: absolute;
            top: 20px;
            left: -30px;
            background: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .badge-fps::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #00e676;
            border-radius: 50%;
            display: inline-block;
        }

        .badge-disc {
            position: absolute;
            top: 15px;
            right: -20px;
            background: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1.name {
            font-size: 24px;
            font-weight: 800;
            color: #2c3e50;
            margin-top: 10px;
        }
        
        .verified { color: #1da1f2; font-size: 18px; vertical-align: middle; }
        p.alias { font-size: 14px; color: #7f8c8d; font-weight: 700; margin-bottom: 20px; }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
        }
        
        .social-links a { color: #2c3e50; font-size: 22px; text-decoration: none; transition: 0.2s; cursor: pointer; }
        .social-links a:hover { transform: scale(1.1); color: #aab6fe; }

        .info-list {
            text-align: left;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }
        
        .info-item { margin-bottom: 15px; }
        .info-label { font-size: 11px; font-weight: 800; color: #95a5a6; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .info-value { font-size: 15px; font-weight: 700; color: #34495e; display: flex; align-items: center; }

        #toggle-phone {
            margin-left: 10px;
            color: #95a5a6;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            font-size: 16px; 
        }
        
        #toggle-phone:hover {
            color: #3498db; 
            transform: scale(1.1);
        }

        .about-card h2 { text-align: left; font-size: 22px; font-weight: 800; margin-bottom: 15px; position: relative; }
        .about-card h2::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 40px; height: 3px;
            background: linear-gradient(90deg, #f39c12, #3498db); border-radius: 2px;
        }
        .about-card p { text-align: left; font-weight: 700; font-size: 14px; color: #555; margin-bottom: 25px; }

        .payment-box {
            border: 1px solid #eee; 
            border-radius: 16px; 
            padding: 20px 15px; 
            text-align: center; 
            margin-bottom: 15px;
            background-color: #FFFFFF;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }

        .payment-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .bank-img { 
            height: 55px; 
            width: auto; 
            max-width: 100%;
            object-fit: contain; 
            margin: 0 auto 15px auto; 
            display: block; 
            border-radius: 8px; 
        }

        .stk-highlight {
            padding: 8px 16px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: inline-block;
            font-size: 16px;
        }
        .stk-mb { background-color: #e0f7fa; color: #123281; }
        .stk-tcb { background-color: #ffebee; color: #E51124; }

        .modal {
            display: none; 
            position: fixed;
            z-index: 10000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); 
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            position: relative;
            max-width: 320px; 
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #bdc3c7;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover { color: #e74c3c; }

        .modal-h3 {
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 800;
        }

        .qr-img-modal {
            width: 100%; 
            height: auto;
            border-radius: 16px;
            border: 1px solid #eee;
            display: block;
            margin: 0 auto;
        }

        /* --- HỆ THỐNG TÊN LỬA MỚI (CHUẨN 100%) --- */
        .rocket-container {
            position: fixed;
            top: -50px; /* Bắt đầu từ ngoài màn hình */
            z-index: 9999;
            pointer-events: none; /* Không cản trở click */
        }

        .falling-rocket {
            font-size: 24px;
            color: #e74c3c;
            /* Animation rơi xuống */
            animation: fallAnimation linear forwards;
            display: block;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.6);
        }

        .exploding-rocket {
            font-size: 35px; /* Icon nổ to hơn */
            display: block;
            /* Animation nổ tung */
            animation: explodeAnimation 0.5s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        @keyframes fallAnimation {
            0% { transform: translateY(0) rotate(180deg); }
            100% { transform: translateY(98vh) rotate(180deg); } /* Rơi sát đáy màn hình */
        }

        @keyframes explodeAnimation {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; } /* Phóng to và mờ dần đi */
        }

        @media (min-width: 768px) {
            .container { max-width: 950px; margin-top: 160px; }
            .profile-card { display: flex; align-items: center; text-align: left; padding: 30px 40px; }
            .avatar-container { margin-top: -70px; margin-right: 30px; margin-bottom: 0; flex-shrink: 0; }
            .profile-info-center { flex: 1; }
            .profile-info-center h1.name { margin-top: 0; }
            .profile-info-center .social-links { justify-content: flex-start; margin-bottom: 0; }
            .info-list { border-top: none; border-left: 1px solid #e2e8f0; padding-top: 0; padding-left: 40px; margin-left: 20px; min-width: 250px; }
            .about-card { padding: 40px; }
            .payment-grid { display: flex; gap: 30px; }
            .payment-box { flex: 1; margin-bottom: 0; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="background-banner"></div>

    <div class="container">
        <div class="card profile-card">
            <div class="avatar-container">
                <div class="badge-fps" id="live-fps">FPS:...</div>
                <div class="avatar-border">
                    <img src="avatar.png" alt="Avatar" class="avatar">
                </div>
                <div class="badge-disc"><i class="fas fa-compact-disc"></i></div>
            </div>

            <div class="profile-info-center">
                <h1 class="name">Trần Gia Đại <i class="fas fa-check-circle verified"></i></h1>
                <p class="alias">Mr bịp</p>

                <div class="social-links">
                    <a href="https://www.facebook.com/iamgiadai" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://zalo.me/0942129369" title="Zalo"><i class="fas fa-comment-dots"></i></a>
                    <a href="https://www.tiktok.com/@iamgiadai" title="TikTok"><i class="fab fa-tiktok"></i></a>
                    <a href="https://t.me/Trangiadai" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                    <a onclick="showQR('wechat.jpg', 'Quét mã WeChat')" title="WeChat"><i class="fab fa-weixin"></i></a>
                </div>
            </div>

            <div class="info-list">
                <div class="info-item">
                    <span class="info-label">BIRTHDAY</span>
                    <span class="info-value">14/08/2005</span>
                </div>
                <div class="info-item">
                    <span class="info-label">CALL ME</span>
                    <span class="info-value">
                        <span id="phone-numbers">0942***369 | 0364***825</span>
                        <i class="fas fa-eye" id="toggle-phone" onclick="togglePhone()" title="Hiện/Ẩn số điện thoại"></i>
                    </span>
                </div>
            </div>
        </div>

        <div class="card about-card">
            <h2>Giới thiệu</h2>
            <p>Xã Yên Đồng - Tỉnh Ninh Bình</p>

            <div class="payment-grid">
                <div class="payment-box" onclick="showQR('qrmb.jpg', 'Quét mã để chuyển')">
                    <img src="logomb.jpg" alt="MB Bank Logo" class="bank-img">
                    <div>
                        <span class="stk-highlight stk-mb">1408200598</span>
                    </div>
                </div> 
                
                <div class="payment-box" onclick="showQR('qrteck.jpg', 'Quét mã để chuyển')">
                    <img src="logoteck.jpg" alt="Techcombank Logo" class="bank-img">
                    <div>
                        <span class="stk-highlight stk-tcb">1408200550</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 class="modal-h3" id="modalTitle">Quét mã để chuyển</h3>
            <img id="qrImage" src="" alt="QR Code" class="qr-img-modal">
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="ganhme.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. Nhạc nền
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('bg-music');
            if (audio.paused) { audio.play(); }
        });
        
        document.body.addEventListener('touchstart', function() {
            var audio = document.getElementById('bg-music');
            if (audio.paused) { audio.play(); }
        });

        // 2. Mã FPS
        const fpsElement = document.getElementById('live-fps');
        let frameCount = 0;
        let lastTime = performance.now();

        function updateFPS() {
            const currentTime = performance.now();
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                if(fpsElement) { fpsElement.innerHTML = "FPS:" + frameCount; }
                frameCount = 0;
                lastTime = currentTime;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();

        // 3. Hiện/Ẩn SĐT
        const phoneSpan = document.getElementById("phone-numbers");
        const toggleIcon = document.getElementById("toggle-phone");
        const realPhones = "0942129369 | 0364140825";
        const hiddenPhones = "0942***369 | 0364***825";
        let isPhoneHidden = true;

        function togglePhone() {
            if (isPhoneHidden) {
                phoneSpan.textContent = realPhones;
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
                isPhoneHidden = false;
            } else {
                phoneSpan.textContent = hiddenPhones;
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
                isPhoneHidden = true;
            }
        }

        // 4. Modal QR
        const modal = document.getElementById("qrModal");
        const qrImage = document.getElementById("qrImage");
        const modalTitle = document.getElementById("modalTitle");

        function showQR(imageSrc, titleText) {
            qrImage.src = imageSrc; 
            modalTitle.textContent = titleText; 
            modal.style.display = "flex"; 
        }

        function closeModal() {
            modal.style.display = "none"; 
            qrImage.src = ""; 
        }

        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }

        // 5. Logic tên lửa nổ chuẩn xác 100%
        function createRocket() {
            // Tạo thẻ bao bọc tên lửa
            const rocketWrapper = document.createElement('div');
            rocketWrapper.className = 'rocket-container';
            rocketWrapper.style.left = Math.random() * 95 + 'vw'; // Random vị trí ngang
            
            // Tạo thẻ icon tên lửa bên trong
            const rocketIcon = document.createElement('i');
            rocketIcon.className = 'fas fa-rocket falling-rocket';
            
            // Random tốc độ rơi từ 1.5s đến 3.5s
            const fallDuration = Math.random() * 2 + 1.5; 
            rocketIcon.style.animationDuration = fallDuration + 's';
            
            // Lắp ráp
            rocketWrapper.appendChild(rocketIcon);
            document.body.appendChild(rocketWrapper);
            
            // LẮNG NGHE SỰ KIỆN: Khi CSS animation chạy xong
            rocketIcon.addEventListener('animationend', (event) => {
                if (event.animationName === 'fallAnimation') {
                    // Khi vừa rơi xong -> Đổi thành vụ nổ
                    rocketIcon.className = 'exploding-rocket';
                    rocketIcon.innerHTML = '💥'; // Thay icon tên lửa bằng icon nổ
                    rocketIcon.style.animationDuration = '0.5s'; // Thời gian nổ 0.5s
                } else if (event.animationName === 'explodeAnimation') {
                    // Khi nổ xong -> Xóa vĩnh viễn
                    rocketWrapper.remove();
                }
            });
        }

        // Cứ 400ms bắn một quả
        setInterval(createRocket, 400); 
    </script>
</body>
</html>
